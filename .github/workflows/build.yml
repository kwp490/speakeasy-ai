name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build binary with PyInstaller
        run: uv run pyinstaller dictator.spec

      - name: Verify binary exists
        run: |
          if (!(Test-Path "dist\dictator\dictator.exe")) {
            Write-Error "dictator.exe not found in dist\dictator\"
            exit 1
          }
          Write-Host "Binary built successfully: dist\dictator\dictator.exe"
          (Get-Item "dist\dictator\dictator.exe").Length / 1MB | ForEach-Object { "Size: {0:N1} MB" -f $_ }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dictator-binary
          path: dist/dictator/
          retention-days: 7
