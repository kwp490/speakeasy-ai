name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        variant: [gpu, cpu]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build binary with PyInstaller
        run: |
          $spec = if ("${{ matrix.variant }}" -eq "cpu") { "dictator-cpu.spec" } else { "dictator.spec" }
          uv run pyinstaller $spec

      - name: Verify binary exists
        run: |
          $distDir = if ("${{ matrix.variant }}" -eq "cpu") { "dist\dictator-cpu" } else { "dist\dictator" }
          $exePath = "$distDir\dictator.exe"
          if (!(Test-Path $exePath)) {
            Write-Error "dictator.exe not found in $distDir"
            exit 1
          }
          Write-Host "Binary built successfully: $exePath"
          (Get-Item $exePath).Length / 1MB | ForEach-Object { "Size: {0:N1} MB" -f $_ }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dictator-binary-${{ matrix.variant }}
          path: dist/${{ matrix.variant == 'cpu' && 'dictator-cpu' || 'dictator' }}/
          retention-days: 7
