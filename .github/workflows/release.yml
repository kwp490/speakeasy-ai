name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build binary with PyInstaller
        run: uv run pyinstaller dictator.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build GUI installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\dictator-setup.iss

      - name: Generate checksums
        run: |
          $installer = Get-ChildItem "installer\Output\dictator-AI-Setup-*.exe" | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
          "$hash  $($installer.Name)" | Out-File -FilePath "installer\Output\SHA256SUMS.txt" -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/dictator-AI-Setup-*.exe
            installer/Output/SHA256SUMS.txt
          body_path: installer/Output/release-notes.md
          draft: true
